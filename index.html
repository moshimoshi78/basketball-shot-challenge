<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Shot Challenge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card">
        <header class="hud">
          <div class="hud-item">
            <span class="hud-label">Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">Level</span>
            <strong id="levelValue">1</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">Shots Left</span>
            <strong id="shotsValue">5</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">Best</span>
            <strong id="bestValue">0</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">Streak</span>
            <strong id="streakValue">0</strong>
          </div>
        </header>

        <section class="message-row">
          <p id="messageText">Drag from the ball toward the hoop to aim.</p>
          <button id="restartButton" class="ghost-button" type="button">
            Try Again
          </button>
        </section>

        <section class="canvas-wrap">
          <canvas
            id="gameCanvas"
            width="960"
            height="540"
            aria-label="Basketball Shot Challenge game canvas"
          ></canvas>

          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <h1>Basketball Shot Challenge</h1>
              <p id="overlayText">
                Sink baskets, level up, and see how high you can score.
              </p>
              <button id="overlayButton" class="play-button" type="button">
                Start Game
              </button>
            </div>
          </div>
        </section>

        <footer class="help-text">
          Drag from the ball toward your shot. Release to shoot. Make enough
          baskets to reach the next level.
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
